name: CI

# Runs on every PR and push to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cargo \
            fontconfig freetype2 \
            libxkbcommon wayland wayland-protocols \
            pixman libglvnd mesa \
            gtk4 gtk4-layer-shell libadwaita

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Guardrail — renderer-femtovg is mandatory for transparency
        run: |
          # Workspace Cargo.toml must use renderer-femtovg, never software/skia
          # renderer-software uses softbuffer which hardcodes XRGB on Wayland (no alpha)
          if grep -q 'renderer-software\|renderer-skia' Cargo.toml; then
                echo "::error::Workspace Cargo.toml uses wrong renderer — transparency will break!"
                echo "The Slint feature MUST be 'renderer-femtovg', not 'renderer-software' or 'renderer-skia'."
                exit 1
          fi
          # smpl-common must use .with_renderer_name("femtovg")
          if ! grep -q 'with_renderer_name("femtovg")' smpl-common/src/lib.rs; then
                echo "::error::smpl-common/src/lib.rs is missing .with_renderer_name(\"femtovg\")"
            exit 1
          fi
          echo "✓ Transparency guardrails passed"

      # ── Feature inventory guardrails ──────────────────────────────────────
      # These grep checks catch accidental deletion of important features during
      # "sync" operations between repos or bulk edits. Each check names the
      # feature and the exact indicator string so failures are immediately clear.
      #
      # When intentionally removing a feature, delete the corresponding check too.
      - name: Guardrail — webapp keybinding feature must not be deleted
        run: |
          FAIL=0

          check() {
            local label="$1" file="$2" pattern="$3"
            if ! grep -q "$pattern" "$file" 2>/dev/null; then
              echo "::error file=$file::REGRESSION: $label"
              echo "  Expected to find: $pattern"
              echo "  This feature was deleted — see commit history for last good version."
              FAIL=1
            else
              echo "✓ $label"
            fi
          }

          # webapp-center: keybinding backend (main.rs)
          check "webapp-center imports smpl_common::keybindings" \
            webapp-center/src/main.rs \
            "use smpl_common::keybindings"

          check "webapp-center has_hotkey field populated in to_ui_item" \
            webapp-center/src/main.rs \
            "has_hotkey:"

          check "webapp-center registers hotkey_start_capture callback" \
            webapp-center/src/main.rs \
            "on_hotkey_start_capture"

          check "webapp-center registers hotkey_save_combo callback" \
            webapp-center/src/main.rs \
            "on_hotkey_save_combo"

          check "webapp-center saves keybinding on save_app" \
            webapp-center/src/main.rs \
            "hk_key"

          # build_launch_args must exist and include all app flags.
          # Regression: bffa03c omitted --secure/--clear-on-exit from binding args
          # so launching via hotkey silently ignored those flags.
          check "webapp-center has build_launch_args function" \
            webapp-center/src/main.rs \
            "fn build_launch_args"

          check "webapp-center build_launch_args includes --clear-on-exit" \
            webapp-center/src/main.rs \
            "--clear-on-exit"

          check "webapp-center build_launch_args includes --secure" \
            webapp-center/src/main.rs \
            "--secure"

          # webapp-center: keybinding UI (main.slint)
          check "webapp-center Slint struct has has_hotkey field" \
            webapp-center/ui/main.slint \
            "has_hotkey"

          check "webapp-center Slint UI has form-hotkey-capturing property" \
            webapp-center/ui/main.slint \
            "form-hotkey-capturing"

          check "webapp-center Slint UI has Keyboard Shortcut section" \
            webapp-center/ui/main.slint \
            "Keyboard Shortcut"

          check "webapp-center Slint UI has hotkey-save-combo callback" \
            webapp-center/ui/main.slint \
            "hotkey-save-combo"

          # smpl-common: keybindings module must be public
          check "smpl-common exports keybindings module" \
            smpl-common/src/lib.rs \
            "pub mod keybindings"

          check "smpl-common keybindings has BindingsFile" \
            smpl-common/src/keybindings.rs \
            "pub struct BindingsFile"

          check "smpl-common keybindings has slint_key_to_hyprland" \
            smpl-common/src/keybindings.rs \
            "pub fn slint_key_to_hyprland"

          # ── start-menu: keyboard navigation features ──────────────────────
          # Regression: 6c1b844 synced an older smplos copy that overwrote
          # the focus-search / DownArrow / type-to-search fix, breaking
          # arrow-key navigation from the search box.

          check "start-menu focus-search targets FocusScope (not TextInput)" \
            start-menu/ui/main.slint \
            "search-scope.focus()"

          check "start-menu has search-pop-char callback" \
            start-menu/ui/main.slint \
            "callback search-pop-char"

          check "start-menu DownArrow calls focus-app()" \
            start-menu/ui/main.slint \
            "root.focus-app()"

          check "start-menu type-to-search forwarding in search FocusScope" \
            start-menu/ui/main.slint \
            "root.search-text = root.search-text + event.text"

          check "start-menu Rust implements search-pop-char" \
            start-menu/src/main.rs \
            "on_search_pop_char"

          # ── settings: keyboard layout dropdown bounds safety ──────────────
          # Regression: stale selected-dropdown-index on a shorter model
          # caused Slint out-of-bounds runtime error.

          check "settings dropdown has upper bounds check" \
            settings/ui/main.slint \
            "selected-dropdown-index < root.available-layouts.length"

          check "settings resets index before shrinking model" \
            settings/src/main.rs \
            "set_selected_dropdown_index(-1)"

          if [ $FAIL -ne 0 ]; then
            echo ""
            echo "One or more feature guardrails failed."
            echo "If the deletion was intentional, remove the corresponding check from ci.yml."
            echo "If it was accidental, restore the code from git history."
            exit 1
          fi

      - name: Check (all workspace members)
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build (debug, for compile-time errors only — not stripped)
        run: cargo build --workspace

      - name: Test
        # --lib --bins: skip doctests that reference types from consuming crates
        # (e.g. MainWindow, which is only in scope after slint::include_modules!()).
        # Unit tests in #[cfg(test)] modules are fully covered by --lib.
        run: cargo test --workspace --lib --bins --no-fail-fast 2>&1
