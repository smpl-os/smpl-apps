name: CI

# Runs on every PR and push to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cargo \
            fontconfig freetype2 \
            libxkbcommon wayland wayland-protocols \
            pixman libglvnd mesa \
            gtk4 gtk4-layer-shell libadwaita

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Check (all workspace members)
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build (debug, for compile-time errors only — not stripped)
        run: cargo build --workspace
