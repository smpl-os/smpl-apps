name: Release

# Triggered manually. Every run:
#   1. Checks out the LATEST main (no stale checkout)
#   2. Runs cargo check + guardrails before spending time on a full build
#   3. Bumps the patch version
#   4. Builds all apps in release mode
#   5. Pushes the version bump commit to main
#   6. Creates the tag via GitHub API (avoids GITHUB_TOKEN workflows permission issue)
#   7. Publishes binaries as a GitHub Release
#
# Why no `git pull --rebase`?
#   The old workflow would rebase onto main during release. If someone pushed a
#   commit that touched .github/workflows/, the rebase would include it in the
#   tag, and GitHub would reject the tag push because GITHUB_TOKEN lacks the
#   `workflows` permission. By checking out the latest main upfront (fetch-depth: 0)
#   and pushing only our version bump commit, we avoid this entirely.
#
# Usage: GitHub -> Actions -> Release -> Run workflow
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-and-release:
    name: Bump version, build, release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cargo mold \
            fontconfig freetype2 \
            libxkbcommon wayland wayland-protocols \
            pixman libglvnd mesa \
            gtk4 gtk4-layer-shell libadwaita \
            glib2 gobject-introspection \
            dbus

      - name: Guardrails
        run: |
          if grep -q 'renderer-software\|renderer-skia' Cargo.toml; then
            echo "::error::Workspace Cargo.toml uses wrong renderer -- transparency will break!"
            exit 1
          fi
          if ! grep -q 'with_renderer_name("femtovg")' smpl-common/src/lib.rs; then
            echo "::error::smpl-common missing .with_renderer_name(\"femtovg\")"
            exit 1
          fi

      - name: Pre-flight check (cargo check)
        run: cargo check --workspace

      - name: Bump patch version in workspace Cargo.toml
        id: version
        run: |
          CURRENT=$(grep -m1 '^version\s*=' Cargo.toml | grep -oP '\d+\.\d+\.\d+')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "0,/^version\s*=\s*\"${CURRENT}\"/s//version    = \"${NEW_VERSION}\"/" Cargo.toml
          echo "old=$CURRENT"     >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build all apps (release)
        run: |
          export RUSTFLAGS="-C link-arg=-fuse-ld=mold"
          cargo build --release --workspace

      - name: Push version bump to main
        run: |
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git push origin main

      - name: Create tag via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the SHA of the commit we just pushed
          COMMIT_SHA=$(git rev-parse HEAD)
          TAG="${{ steps.version.outputs.tag }}"

          # Create a lightweight tag via the API (bypasses the workflows permission issue)
          pacman -S --noconfirm --needed curl
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/${TAG}\",\"sha\":\"${COMMIT_SHA}\"}"
          echo "Created tag $TAG -> $COMMIT_SHA"

      - name: Strip and collect binaries
        run: |
          mkdir -p dist
          for bin in start-menu notif-center settings app-center webapp-center \
                     sync-center-daemon sync-center-gui \
                     smpl-calendar smpl-calendar-alertd; do
            src="target/release/$bin"
            if [[ -f "$src" ]]; then
              strip "$src"
              cp "$src" dist/
            fi
          done
          ls -lh dist/

      - name: Create bundle tarball
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          tar -czf "smpl-apps-${VERSION}-x86_64.tar.gz" -C dist .
          echo "BUNDLE=smpl-apps-${VERSION}-x86_64.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "smpl-apps v${{ steps.version.outputs.new }}"
          generate_release_notes: true
          files: |
            ${{ env.BUNDLE }}
            dist/start-menu
            dist/notif-center
            dist/settings
            dist/app-center
            dist/webapp-center
            dist/sync-center-daemon
            dist/sync-center-gui
            dist/smpl-calendar
            dist/smpl-calendar-alertd
