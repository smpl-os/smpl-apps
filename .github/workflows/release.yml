name: Release

# Triggers on version tags: v1.2.3
# To release: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build:
    name: Build smpl-apps
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged   # needed for pacman keyring init

    steps:
      - name: Install git (needed for checkout)
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel rust cargo mold \
            fontconfig freetype2 \
            libxkbcommon wayland wayland-protocols \
            pixman libglvnd mesa \
            gtk4 gtk4-layer-shell libadwaita

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build all apps (release)
        run: |
          # Use mold for faster linking
          export RUSTFLAGS="-C link-arg=-fuse-ld=mold"
          cargo build --release --workspace

      - name: Strip and collect binaries
        run: |
          mkdir -p dist
          # Collect all workspace binaries (exclude smpl-common — it's a lib)
          for bin in start-menu notif-center settings app-center webapp-center \
                     sync-center sync-center-daemon sync-center-gui; do
            src="target/release/$bin"
            if [[ -f "$src" ]]; then
              strip "$src"
              cp "$src" dist/
              echo "  $bin: $(du -h "dist/$bin" | cut -f1)"
            fi
          done
          ls -lh dist/

      - name: Create bundle tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf smpl-apps-${VERSION}-x86_64.tar.gz -C dist .
          echo "BUNDLE=smpl-apps-${VERSION}-x86_64.tar.gz" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "smpl-apps v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            ${{ env.BUNDLE }}
            dist/start-menu
            dist/notif-center
            dist/settings
            dist/app-center
            dist/webapp-center
            dist/sync-center
            dist/sync-center-daemon
            dist/sync-center-gui
